services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: golewood
      POSTGRES_PASSWORD: golewood
      POSTGRES_DB: golewood
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U golewood -d golewood']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    ports:
      - '7700:7700'
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:7700/health > /dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
