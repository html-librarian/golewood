name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error title=Missing secret::Set Actions secret ${name} (Settings → Secrets → Actions, or environment production)"
              missing=1
            fi
          done
          if [[ -z "${GHCR_TOKEN:-}" ]]; then
            echo "::warning::GHCR_TOKEN is empty — docker pull works only if ghcr.io/html-librarian/golewood is public"
          fi
          exit "${missing}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH || '/var/opt/golewood' }}"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/remote-deploy.sh
            export SITE_URL="${{ secrets.DEPLOY_SITE_URL }}"
            export GOLEWOOD_USE_REGISTRY=1
            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export GHCR_USER="${{ secrets.GHCR_USER || 'html-librarian' }}"
            ./scripts/remote-deploy.sh
